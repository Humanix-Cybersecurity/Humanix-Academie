# =============================================================================
# HAProxy 2.9 - Frontend dev (HTTPS local via mkcert)
# -----------------------------------------------------------------------------
# Ce fichier est utilise UNIQUEMENT en dev local via docker-compose.dev.yml
# (lance par scripts/start.sh).
#
# Difference avec haproxy.cfg (prod) :
#   - frontend HTTPS sur 443 active avec cert local mkcert
#   - redirect HTTP -> HTTPS active (HSTS bootstrap)
#   - bot UA filter desactive (curl/wget legitimes en dev pour debug)
#   - rate limits relaches (HMR Next.js + hot reload)
#
# En prod, c'est haproxy.cfg qui est utilise (cf. docker-compose.yml de base).
# =============================================================================

global
    log stdout format raw local0 info
    maxconn 4000
    nbthread 4
    cpu-map auto:1/1-4 0-3

    # TLS hardening identique a la prod : Mozilla "Intermediate" + ANSSI RGS B
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets prefer-client-ciphers
    ssl-default-bind-ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256
    ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

    resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    accepted_payload_size 8192
    hold other 30s
    hold refused 30s
    hold nx 30s
    hold timeout 30s
    hold valid 10s

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    option redispatch
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    timeout queue   30s
    timeout http-request 10s
    timeout http-keep-alive 4s
    retries 3

    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# =============================================================================
# Stick-table : rate limiting
# =============================================================================
backend stk_abuse
    stick-table type ipv6 size 100k expire 30m store http_req_rate(10s),http_err_rate(10s),conn_rate(10s),conn_cur

# =============================================================================
# FRONTEND HTTP (port 80) - redirect vers HTTPS
# =============================================================================
frontend humanix_http
    bind *:80

    # Pas de filtre UA en dev (curl/wget legitimes)
    acl method_allowed method GET POST PUT PATCH DELETE OPTIONS HEAD
    http-request deny deny_status 405 if !method_allowed

    # Whitelist /api/health en HTTP (pour healthcheck Docker / Uptime)
    acl is_health path /api/health
    acl is_health_alias path /health

    # HSTS redirect : tout HTTP vers HTTPS sauf /health
    http-request redirect scheme https code 301 unless is_health is_health_alias

    default_backend humanix_app

# =============================================================================
# FRONTEND HTTPS (port 443) - cert local mkcert
# =============================================================================
frontend humanix_https
    bind *:443 ssl crt /etc/haproxy/certs/humanix.local.pem alpn h2,http/1.1

    http-request track-sc0 src table stk_abuse

    # === SECURITY ACL ===
    acl method_allowed method GET POST PUT PATCH DELETE OPTIONS HEAD
    http-request deny deny_status 405 if !method_allowed

    # === RATE LIMITING (relax dev) ===
    acl src_localhost src 127.0.0.1/32 ::1/128
    acl is_abuser_req sc_http_req_rate(0) gt 800
    acl is_abuser_err sc_http_err_rate(0) gt 100
    acl is_abuser_conn sc_conn_rate(0) gt 200
    http-request deny deny_status 429 if is_abuser_req !src_localhost
    http-request deny deny_status 429 if is_abuser_err !src_localhost
    http-request deny deny_status 429 if is_abuser_conn !src_localhost

    # === SECURITY HEADERS ===
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=()"
    http-response set-header X-XSS-Protection "0"

    http-response del-header Server
    http-response del-header X-Powered-By

    # X-Forwarded-Proto pour que Next.js sache qu'on est en HTTPS
    http-request set-header X-Forwarded-Proto https

    default_backend humanix_app

# =============================================================================
# BACKEND : application Next.js
# =============================================================================
backend humanix_app
    balance roundrobin

    # Health check : syntaxe moderne HAProxy 2.4+ (HTTP/1.1 + Host header).
    # L'ancienne `option httpchk GET /api/health` envoyait HTTP/1.0 sans Host,
    # ce que Next.js 15 rejette / traite mal.
    option httpchk
    http-check send meth GET uri /api/health ver HTTP/1.1 hdr Host humanix.local
    http-check expect status 200
    timeout check 10s

    server-template app 1 app:3000 check inter 3s rise 2 fall 3 resolvers docker init-addr libc,none

    http-request set-header X-Real-IP %[src]
    http-request set-header X-Forwarded-For %[src]
    http-request set-header X-Forwarded-Host %[req.hdr(host)]

# =============================================================================
# STATS (port 8404) - dev only
# =============================================================================
frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if FALSE
    # Auth basique - meme strategie qu'en prod (haproxy.cfg) : password
    # depuis l'env HAPROXY_STATS_PASSWORD, default dans docker-compose.
    stats auth admin:"${HAPROXY_STATS_PASSWORD}"
    stats realm   Humanix\ HAProxy\ Stats\ \(dev\)
    stats hide-version
