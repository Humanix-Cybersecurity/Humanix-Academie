# =============================================================================
# HAProxy 2.9 — Frontend HumaniX Académie
# Niveau de sécurité : "PME ANSSI ready"
# Évolutions futures (TODO marquées) : WAF coraza, mTLS pour API B2B
# =============================================================================

global
    log stdout format raw local0 info
    maxconn 4000
    # Tuning : ouvert pour 4k connexions concurrentes (largement suffisant PME)
    nbthread 4
    cpu-map auto:1/1-4 0-3

    # TLS hardening : conformité Mozilla "Intermediate" + ANSSI RGS B
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets prefer-client-ciphers
    ssl-default-bind-ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256
    ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

    # Cache des stats DNS pour les services Docker (resolveurs internes)
    resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    accepted_payload_size 8192
    hold other 30s
    hold refused 30s
    hold nx 30s
    hold timeout 30s
    hold valid 10s

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor       # X-Forwarded-For (IP client réelle)
    option http-server-close
    option redispatch
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    timeout queue   30s
    timeout http-request 10s
    timeout http-keep-alive 4s
    retries 3

    # Erreurs personnalisées (anti-fingerprint serveur)
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# =============================================================================
# Stick-table : rate limiting + tracking IP malveillantes
# =============================================================================
backend stk_abuse
    stick-table type ipv6 size 100k expire 30m store http_req_rate(10s),http_err_rate(10s),conn_rate(10s),conn_cur

# =============================================================================
# FRONTEND HTTP (port 80) — redirige vers HTTPS si TLS dispo, sinon sert direct
# =============================================================================
frontend humanix_http
    bind *:80

    # Track tous les clients dans la table d'abus
    http-request track-sc0 src table stk_abuse

    # === SECURITY ACL ===
    # Méthodes HTTP autorisées (RFC 7231) — tout le reste est rejeté en 405.
    # IMPORTANT : `deny_status <code>` doit IMPÉRATIVEMENT precéder le `if`
    # dans HAProxy 2.4+, sinon parsing error "no such ACL : 'deny_status'".
    acl method_allowed method GET POST PUT PATCH DELETE OPTIONS HEAD
    http-request deny deny_status 405 if !method_allowed

    # Bloque les User-Agent vides ou bots agressifs connus
    acl ua_blocked hdr_reg(user-agent) -i (sqlmap|nikto|nmap|masscan|wpscan|gobuster|dirbuster|hydra|hakrawler)
    acl ua_empty hdr_cnt(user-agent) eq 0
    http-request deny deny_status 403 if ua_blocked
    http-request deny deny_status 403 if ua_empty

    # === RATE LIMITING ===
    # Seuils ajustes pour Next.js : RSC + hot reload + many static chunks
    # par navigation peut depasser 100 req/10s legitimement. Pour bloquer
    # un vrai bruteforce login on s'appuie sur le lockout app-side
    # (5 echecs / 15 min dans lib/auth.ts).
    #  - 400 req/10s (vs 100) : couvre navigation normale + onglets multi
    #  - 80 errors/10s (vs 30) : tolere 404 d'assets en dev
    #  - 100 connexions/10s (vs 50) : Next dev ouvre WebSockets HMR
    # Localhost exempte explicitement (acces depuis la VM/host).
    acl src_localhost src 127.0.0.1/32 ::1/128
    acl is_abuser_req sc_http_req_rate(0) gt 400
    acl is_abuser_err sc_http_err_rate(0) gt 80
    acl is_abuser_conn sc_conn_rate(0) gt 100
    http-request deny deny_status 429 if is_abuser_req !src_localhost
    http-request deny deny_status 429 if is_abuser_err !src_localhost
    http-request deny deny_status 429 if is_abuser_conn !src_localhost

    # === HSTS REDIRECT ===
    # Si TLS_ENABLED, on redirige tout HTTP vers HTTPS.
    # En dev / sans cert, on commente cette ligne. La var TLS_ENABLED est
    # toggleable via la config compose (env haproxy.entrypoint).
    # http-request redirect scheme https code 301 unless { ssl_fc }

    # === SECURITY HEADERS (response) ===
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=()"
    http-response set-header X-XSS-Protection "0"  # CSP la remplace, on désactive

    # On ne remonte JAMAIS l'identité du serveur web
    http-response del-header Server
    http-response del-header X-Powered-By

    default_backend humanix_app

# =============================================================================
# FRONTEND HTTPS (port 443) — ACTIVABLE quand un cert est monté
# Pour activer : décommenter la directive bind ssl + monter cert dans compose
# =============================================================================
# frontend humanix_https
#     bind *:443 ssl crt /etc/haproxy/certs/fullchain.pem alpn h2,http/1.1
#     http-request set-header X-Forwarded-Proto https
#     # ... mêmes ACL et headers que frontend HTTP ...
#     default_backend humanix_app

# =============================================================================
# BACKEND : application Next.js
# =============================================================================
backend humanix_app
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200

    # Resolveurs Docker pour ré-résoudre l'IP de `app` au démarrage
    server-template app 1 app:3000 check resolvers docker init-addr libc,none

    # Headers vers le backend : passer l'IP client réelle
    http-request set-header X-Real-IP %[src]
    http-request set-header X-Forwarded-For %[src]
    http-request set-header X-Forwarded-Host %[req.hdr(host)]

# =============================================================================
# STATS (port 8404) — accès interne uniquement (pas exposé sur l'host public)
# =============================================================================
frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if FALSE  # lecture seule, pas de manipulation
    # En prod : ajouter "stats auth admin:..." avec password fort
