;
; Ofelia config - tâches planifiées Humanix Académie.
; Cf. docs/CRON.md pour le tableau de référence (fréquences, criticité,
; rôle de chaque job).
;
; Mode "exec" : ofelia tourne dans son propre container et appelle l'app
; via le réseau interne docker (service "app" du compose). Aucun label
; à poser sur les containers métier - meilleure séparation.
;
; Variables d'env requises (héritées du compose) :
;   - CRON_SECRET          (header X-Cron-Secret pour authentifier l'appel)
;   - APP_INTERNAL_URL     (défaut http://app:3000 si non défini)
;
; Cron expressions : format à 6 champs Quartz (sec min hour day month weekday).
; Ofelia interprète aussi les 5-fields classiques mais on préfère le 6-fields
; pour l'expressivité (ex. décaler de 30s pour étaler les pics).

[global]
save-folder = /tmp/ofelia-runs

; ============================================================================
; QUOTIDIENS - nuit UTC, étalés pour éviter les pics
; ============================================================================

[job-local "risk-snapshot"]
schedule = 0 0 3 * * *
command = sh /scripts/cron-runner.sh risk-snapshot

[job-local "data-retention-purge"]
schedule = 0 15 3 * * *
command = sh /scripts/cron-runner.sh data-retention-purge

[job-local "achievements-reevaluate"]
schedule = 0 30 3 * * *
command = sh /scripts/cron-runner.sh achievements-reevaluate

[job-local "challenge-rewards"]
schedule = 0 45 3 * * *
command = sh /scripts/cron-runner.sh challenge-rewards

[job-local "cyber-event-tick"]
schedule = 0 30 0 * * *
command = sh /scripts/cron-runner.sh cyber-event-tick

[job-local "audit-logs-purge"]
; Filet de securite global : purge AuditLog > 400j (~13 mois CNIL)
; pour les tenants qui n'ont pas configure leur propre dataRetentionDays.
; A run apres data-retention-purge tenant-level.
schedule = 0 0 4 * * *
command = sh /scripts/cron-runner.sh audit-logs-purge

; ============================================================================
; HORAIRES
; ============================================================================

[job-local "phishing-launch"]
schedule = 0 0 * * * *
command = sh /scripts/cron-runner.sh phishing-launch

; ============================================================================
; PERIODIQUES
; ============================================================================

[job-local "breaches-refresh"]
schedule = 0 0 */6 * * *
command = sh /scripts/cron-runner.sh breaches-refresh

[job-local "weekly-anecdote"]
; Lundi 8h00 UTC
schedule = 0 0 8 * * 1
command = sh /scripts/cron-runner.sh weekly-anecdote
