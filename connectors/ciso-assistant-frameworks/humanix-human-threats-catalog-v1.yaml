urn: urn:humanix:risk:library:humanix-human-threats-catalog-v1
locale: fr
ref_id: humanix-human-threats-catalog-v1
name: Humanix Académie - Catalogue de menaces humaines
description: |-
  Catalogue de menaces cyber spécifiques à la couche humaine, complémentaire
  aux bibliothèques de menaces techniques (OWASP, MITRE ATT&CK, etc.).
  Permet à un RSSI de qualifier ses Findings, Incidents et RiskScenarios
  côté CISO Assistant avec des menaces qui décrivent les vecteurs
  d'ingénierie sociale et d'erreurs humaines observées en PME / ETI.

  Sourcé de l'expérience terrain Humanix Académie (cas réels français
  agrégés sur 4 ans : Vinci, Pathé, BNP, divers cas DPO/RSSI clients).
