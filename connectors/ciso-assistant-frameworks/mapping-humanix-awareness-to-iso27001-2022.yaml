urn: urn:humanix:risk:library:mapping-humanix-awareness-to-iso27001-2022
locale: fr
ref_id: mapping-humanix-awareness-to-iso27001-2022
name: Humanix Académie ↔ ISO/IEC 27001:2022
description: |-
  Mapping entre le catalogue de modules de sensibilisation cyber
  Humanix Académie et le standard international ISO/IEC 27001:2022.
  Permet à un RSSI d'identifier instantanément, depuis CISO Assistant,
  quels modules Humanix couvrent quels contrôles ISO 27001.

  Relation utilisée : "intersect" — un module Humanix couvre partiellement
  un contrôle ISO (la couche humaine). Les contrôles techniques associés
  (chiffrement, segmentation réseau, etc.) restent à couvrir par d'autres
  mesures.
