urn: urn:humanix:risk:library:mapping-humanix-awareness-to-anssi-guide-hygiene
locale: fr
ref_id: mapping-humanix-awareness-to-anssi-guide-hygiene
name: Humanix Académie ↔ ANSSI Guide d'hygiène informatique
description: |-
  Mapping entre le catalogue Humanix Académie et le Guide d'hygiène
  informatique de l'ANSSI (42 règles). Cible principalement la section I
  (Sensibiliser et former) qui est le cœur de mission Humanix, plus
  les règles relatives aux pratiques utilisateurs.

  Règles 1 et 2 (formation des équipes opérationnelles + sensibilisation
  des utilisateurs) sont en relation `equal` avec les modules Humanix.
