version: 1
publication_date: 2026-05-15
provider: Humanix-Cybersecurity SASU
packager: Humanix-Cybersecurity
dependencies:
  - urn:humanix:risk:library:humanix-awareness-catalog-v1
  - urn:intuitem:risk:library:anssi-guide-hygiene
objects:
  requirement_mapping_sets:
    - urn: urn:humanix:risk:req_mapping_set:mapping-humanix-awareness-to-anssi-guide-hygiene
      ref_id: mapping-humanix-awareness-to-anssi-guide-hygiene
      name: Humanix Académie ↔ ANSSI Guide d'hygiène informatique
      description: Mapping modules Humanix vers les règles ANSSI HG.
      source_framework_urn: urn:humanix:risk:framework:humanix-awareness-catalog-v1
      target_framework_urn: urn:intuitem:risk:framework:anssi-guide-hygiene
      requirement_mappings:
        # Règle 1 — Former les équipes opérationnelles à la sécurité (CŒUR)
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:cyber-dev
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:1
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:cyber-rh
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:1
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:cyber-compta
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:1
          relationship: equal

        # Règle 2 — Sensibiliser les utilisateurs aux bonnes pratiques (CŒUR)
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:phishing
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:mots-de-passe
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:email-pro
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:donnees-sensibles
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:vie-privee-bureau
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2
          relationship: equal

        # Règle 2.R — Sensibilisation renforcée (cas haut niveau)
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:fraude-president
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2.r
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:deepfakes
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2.r
          relationship: equal
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:cyber-dirigeants
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:2.r
          relationship: equal

        # Règle 3 — Maîtriser les risques de l'infogérance / supply chain
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:supply-chain
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:3
          relationship: intersect

        # Règle 6 — Procédures d'arrivée, départ, changement (RH)
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:cyber-rh
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:6
          relationship: intersect

        # Règle 7 — Connexion réseau (BYOD, devices contrôlés)
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:mobile-smartphone
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:7
          relationship: intersect
        - source_requirement_urn: urn:humanix:risk:req_node:humanix-awareness-catalog-v1:teletravail
          target_requirement_urn: urn:intuitem:risk:req_node:anssi-guide-hygiene:7
          relationship: intersect
