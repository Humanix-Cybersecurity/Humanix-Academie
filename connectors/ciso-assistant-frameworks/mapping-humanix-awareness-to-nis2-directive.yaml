urn: urn:humanix:risk:library:mapping-humanix-awareness-to-nis2-directive
locale: fr
ref_id: mapping-humanix-awareness-to-nis2-directive
name: Humanix Académie ↔ NIS2 Directive (2022/2555)
description: |-
  Mapping entre le catalogue de modules Humanix Académie et la directive
  NIS2 (UE 2022/2555). Cible principalement l'article 21.2 (mesures de
  cybersécurité) et l'article 23 (notification d'incidents).

  Le module Humanix `cyber-dirigeants` couvre `equal` l'obligation de
  formation des organes de direction (NIS2 §20.2) - exigence explicite
  et opposable.
