urn: urn:humanix:risk:library:mapping-humanix-awareness-to-nist-csf-2.0
locale: fr
ref_id: mapping-humanix-awareness-to-nist-csf-2.0
name: Humanix Académie ↔ NIST CSF 2.0
description: |-
  Mapping entre le catalogue Humanix Académie et le NIST Cybersecurity
  Framework 2.0. Cible principalement la fonction PROTECT, subcategory
  PR.AT (Awareness and Training) qui est le cœur de mission Humanix.
  Couvre également DETECT (DE.CM) et RESPOND (RS.CO).

  Sous-catégories PR.AT-01 et PR.AT-02 en relation `equal` avec
  Humanix - formation des employés et utilisateurs privilégiés.
