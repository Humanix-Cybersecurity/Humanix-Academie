urn: urn:humanix:risk:library:mapping-humanix-awareness-to-gdpr
locale: fr
ref_id: mapping-humanix-awareness-to-gdpr
name: Humanix Académie ↔ RGPD (UE 2016/679)
description: |-
  Mapping entre le catalogue de modules Humanix Académie et le règlement
  général sur la protection des données (RGPD). Cible principalement :
    - art. 5 (principes de traitement)
    - art. 25 (privacy by design / by default)
    - art. 32 (sécurité du traitement)
    - art. 33 (notification de violation)
    - art. 35 (AIPD)
    - art. 39 (missions du DPO)

  Le module `dpo-quotidien` couvre `equal` les missions opérationnelles
  du DPO décrites à l'art. 39.
