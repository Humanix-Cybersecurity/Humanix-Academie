# ============================================================
# HumaniX Academy — Stack Docker production-ready
# Démarrage : docker compose up --build
# Reset complet : docker compose down -v && docker compose up --build
# ============================================================
#
# Architecture :
#
#   [Internet:80,443] ──► [haproxy] ─── frontend public, TLS, ACL, rate limit
#                              │
#                              ▼ (réseau humanix_frontend)
#                          [app] (Next.js)
#                              │
#                              ▼ (réseau humanix_backend, isolé)
#                       [postgres]   (TTS = SaaS Mistral Voxtral, plus de container)
#
# Sécurité :
#  - app et postgres JAMAIS exposés sur l'host (ports retirés)
#  - Seul haproxy expose 80/443 sur l'host
#  - 2 réseaux Docker : frontend (haproxy↔app) et backend (app↔db)
#  - postgres n'a accès qu'à app (pas à haproxy)

services:
  # =====================================================================
  # HAPROXY — frontend public, sécurité L4/L7
  # =====================================================================
  haproxy:
    image: haproxy:2.9-alpine
    container_name: humanix-haproxy
    restart: unless-stopped
    environment:
      # Password Basic Auth pour l'interface stats HAProxy (port 8404).
      # En dev local : la valeur par defaut suffit (port bind sur 127.0.0.1
      # uniquement, pas accessible de l'exterieur).
      # En prod : DOIT etre override avec un password genere aleatoirement
      # (cf. .env.example). HAProxy refuse de demarrer si la directive est
      # vide, donc on a un default pour ne jamais bloquer le boot.
      HAPROXY_STATS_PASSWORD: "${HAPROXY_STATS_PASSWORD:-humanix-stats-change-me}"
    ports:
      # Seul service exposé publiquement
      - "80:80"
      # Décommenter quand un cert TLS est en place (cf. infra/haproxy/certs/)
      # - "443:443"
      # Stats internes — uniquement bindé sur localhost (debug local)
      - "127.0.0.1:8404:8404"
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./infra/haproxy/errors:/etc/haproxy/errors:ro
      # Décommenter quand un cert est dispo :
      # - ./infra/haproxy/certs:/etc/haproxy/certs:ro
    networks:
      - humanix_frontend
    depends_on:
      app:
        condition: service_started
    healthcheck:
      # Note : depuis l'ajout de `stats auth admin:...` sur le port 8404,
      # le healthcheck DOIT passer les credentials sinon il recoit 401.
      # BusyBox wget (image Alpine) ne supporte pas --user/--password, mais
      # accepte le format URL `http://user:pass@host`. 127.0.0.1 explicite
      # pour eviter le piege IPv6 dans BusyBox wget.
      # $$HAPROXY_STATS_PASSWORD : $$ echape l'interpolation docker-compose
      # pour que le shell du container expand l'env var au runtime.
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -qO- \"http://admin:$$HAPROXY_STATS_PASSWORD@127.0.0.1:8404/\" | grep -q 'Statistics Report'",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  # =====================================================================
  # POSTGRES — image custom Humanix avec role read-only pre-configure
  # ---------------------------------------------------------------------
  # Basee sur postgres:16-alpine + script d'init dans docker/postgres/initdb/
  # qui cree automatiquement au PREMIER boot :
  #   - role humanix_readonly (NOLOGIN, SELECT-only sur futures tables)
  #   - utilisateur humanix_ro_user (LOGIN, password via env)
  # Cf. docker/postgres/Dockerfile pour les details.
  #
  # Le client app utilise DATABASE_URL (read+write).
  # Les modules analytiques (forecasts, heatmap, risk-score) utilisent
  # DATABASE_URL_READONLY -> defense en profondeur (cf. lib/db-readonly.ts).
  #
  # Apres le 1er prisma db push, applique aussi les REVOKE chirurgicaux :
  #   docker compose exec -e PGPASSWORD=... postgres psql -U humanix \
  #     -d humanix -f /docker-entrypoint-initdb.d/post-migration.sql
  # (ou monter le fichier prisma/sql/post-migration-grants.sql en volume)
  # =====================================================================
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: humanix-postgres:secured
    container_name: humanix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: humanix
      POSTGRES_PASSWORD: humanix_demo
      POSTGRES_DB: humanix
      # Password du role read-only humanix_ro_user. Min 16 chars sinon
      # le script d'init refuse de creer le role.
      # En prod : openssl rand -base64 32. En demo/dev : valeur par defaut OK.
      POSTGRES_READONLY_PASSWORD: "${POSTGRES_READONLY_PASSWORD:-humanix_ro_demo_16_chars_min}"
    # PAS de "ports" : postgres n'est plus exposé sur l'host pour des raisons
    # de sécurité. Pour debug local : `docker exec -it humanix-postgres psql -U humanix`
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - humanix_backend
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U humanix -d humanix && psql -U humanix -d humanix -tAc \"SELECT 1 FROM pg_roles WHERE rolname='humanix_readonly';\" | grep -q 1"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # =====================================================================
  # TTS — Piper self-hosted (option OSS, depuis mai 2026 sous `--profile piper`)
  # ---------------------------------------------------------------------
  # Deux modes au choix selon `TTS_PROVIDER` dans l'env du service `app` :
  #
  #   1. TTS_PROVIDER=voxtral  Mistral Voxtral SaaS (defaut prod). Pas besoin
  #                            de ce container. Pre-rendu via `npm run tts:build`.
  #
  #   2. TTS_PROVIDER=piper    Demarrer aussi ce container :
  #                              docker compose --profile piper up -d
  #                            Voix `fr_FR-siwis-medium` (Piper FR), zero appel
  #                            externe, RGPD/AGPL-friendly. Container 200-500 Mo.
  # =====================================================================
  tts:
    profiles: ["piper"]
    build:
      context: ./infra/tts
      dockerfile: Dockerfile
    image: humanix-tts:1.0.0
    container_name: humanix-tts
    restart: unless-stopped
    networks:
      - humanix_backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5500/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"

  # =====================================================================
  # APP — Next.js
  # Pas exposé sur l'host : seul haproxy y accède via réseau frontend
  # =====================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Build args : les NEXT_PUBLIC_* doivent etre passees a `next build`
      # (le bundle JS les inline cote client). Sans cela, meme si la
      # variable est dans `.env` et passee en `environment:`, elle n'est
      # visible qu'au runtime serveur et JAMAIS dans le bundle client.
      # docker compose substitue ${VAR} depuis le .env du repertoire courant.
      args:
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost}"
        NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-HumaniX Academy}"
        NEXT_PUBLIC_BASE_URL: "${NEXT_PUBLIC_BASE_URL:-}"
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: "${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}"
        NEXT_PUBLIC_PLAUSIBLE_API_HOST: "${NEXT_PUBLIC_PLAUSIBLE_API_HOST:-}"
        NEXT_PUBLIC_PLAUSIBLE_CLOUD_SCRIPT: "${NEXT_PUBLIC_PLAUSIBLE_CLOUD_SCRIPT:-}"
        NEXT_PUBLIC_MATOMO_URL: "${NEXT_PUBLIC_MATOMO_URL:-}"
        NEXT_PUBLIC_MATOMO_SITE_ID: "${NEXT_PUBLIC_MATOMO_SITE_ID:-}"
    container_name: humanix-app
    restart: unless-stopped
    # PAS de "ports" : on passe systématiquement par haproxy
    environment:
      DATABASE_URL: "postgresql://humanix:humanix_demo@postgres:5432/humanix?schema=public"
      # Client read-only pour les surfaces analytiques (cf. lib/db-readonly.ts).
      # Le password vient de POSTGRES_READONLY_PASSWORD du service postgres
      # ci-dessus. Le role est cree au 1er boot par l'image custom.
      # Defense en profondeur : forecasts/heatmap/risk-score passent par
      # ce client, donc impossibles de muter par accident.
      DATABASE_URL_READONLY: "postgresql://humanix_ro_user:${POSTGRES_READONLY_PASSWORD:-humanix_ro_demo_16_chars_min}@postgres:5432/humanix?schema=public"
      AUTH_SECRET: "demo-secret-change-me-in-prod-d3m0-s3cr3t-1234567890"
      AUTH_URL: "http://localhost:80"
      AUTH_TRUST_HOST: "true" # Indispensable derrière un reverse proxy
      NEXT_PUBLIC_APP_URL: "http://localhost"
      NEXT_PUBLIC_APP_NAME: "HumaniX Academy"
      # Lit DEMO_MODE depuis .env (ou la shell). Default "true" pour preserver
      # le comportement historique demo-locale si la variable n'est pas posee.
      # IMPORTANT : sans la substitution ${...}, la valeur en dur ecrasait le
      # .env (precedence docker compose : `environment:` > `env_file:`), ce
      # qui forcait DEMO_MODE=true meme en testant le flow inscription prod.
      DEMO_MODE: "${DEMO_MODE:-true}"
      # DEV_MODE : bypass des integrations externes (Payplug, email) pour
      # tester le flow inscription/souscription en local. Cf. lib/dev-mode.ts.
      # Default "false" pour ne pas changer le comportement historique.
      # Le garde-fou AUTH_URL (localhost only) empeche l'activation accidentelle
      # en prod meme si la variable fuite.
      DEV_MODE: "${DEV_MODE:-false}"
      EMAIL_FROM: "demo@humanix.local"
      # Scaleway TEM — vide en demo, le code retombe en mode "simulated"
      SCALEWAY_TEM_TOKEN: ""
      SCALEWAY_TEM_PROJECT_ID: ""
      SCALEWAY_TEM_REGION: "fr-par"
      NODE_ENV: "production"
      # === TTS premium serveur ===
      # Choisis ton provider :
      #   "voxtral" -> Mistral Voxtral SaaS (necessite MISTRAL_API_KEY plus bas)
      #   "piper"   -> Container Piper local (lance avec --profile piper)
      #   ""        -> pas de TTS serveur, fallback Web Speech API navigateur
      # Si vide et MISTRAL_API_KEY est fourni, "voxtral" est utilise par defaut.
      TTS_PROVIDER: "voxtral"
      # Pour le mode Piper uniquement : URL du container TTS sur le reseau backend.
      # Decommente cette ligne ET `TTS_PROVIDER: "piper"` ci-dessus.
      # TTS_SERVER_URL: "http://tts:5500"
      TTS_SERVER_URL: ""
      # Plan minimum requis pour beneficier du TTS premium serveur.
      # Aligne sur lib/plans.ts. Valeurs : trial / solo / essentielle / pro / premium
      # En demo locale (DEMO_MODE=true) on baisse a "trial" pour que tout user
      # demo ait acces au TTS et puisse tester la voix Marie. En prod, c'est
      # remonte a "pro" via le `.env` Ansible (cf. ansible/templates/env.prod.j2).
      TTS_MIN_PLAN: "trial"
      # === IA generative + TTS Voxtral (Mistral souverain FR) ===
      # MISTRAL_API_KEY DOIT venir de l'environnement / du .env, sinon
      # `environment:` ecraserait `env_file:` et la cle disparaitrait dans
      # le container. Avec ${VAR:-} on lit la variable depuis le shell
      # (`MISTRAL_API_KEY=sk-... docker compose up`) ou depuis le fichier
      # `.env` que docker compose charge automatiquement. Vide -> features
      # IA et TTS Voxtral desactivees, l'app sert les fixtures statiques.
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      MISTRAL_MODEL: "ministral-8b-latest"
      # === SSO Google + Microsoft ===
      # Si vide, les boutons SSO ne s'affichent pas (fallback magic link).
      # Pour activer Google : creer un projet sur console.cloud.google.com,
      # ajouter une URL de redirection : http://localhost/api/auth/callback/google
      AUTH_GOOGLE_ID: ""
      AUTH_GOOGLE_SECRET: ""
      # Pour Microsoft / Entra ID : portal.azure.com → App registrations
      # Redirect URI : http://localhost/api/auth/callback/microsoft-entra-id
      AUTH_MICROSOFT_ENTRA_ID_ID: ""
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ""
      AUTH_MICROSOFT_ENTRA_ID_ISSUER: ""
      # === Cron secret (observatoire des fuites + autres jobs futurs) ===
      # Generer avec : openssl rand -hex 32
      # Utilise pour /api/cron/breaches-refresh (auth header x-cron-secret)
      CRON_SECRET: "demo-cron-secret-change-me-32-chars-minimum-pour-prod"
    networks:
      - humanix_frontend
      - humanix_backend
    volumes:
      # Cache TTS : BIND MOUNT vers le dossier du repo en mode dev/demo OSS.
      # On lie directement `./data/tts-cache/` (host) -> `/app/data/tts-cache/`
      # (container). Avantages :
      #   - les MP3 pre-generes par `npm run tts:build` cote host sont VISIBLES
      #     immediatement par le container (pas besoin de copier dans un volume)
      #   - tu peux modifier le manifest cote host et le voir cote container
      #   - parfait pour le dev local et la demo en self-host
      # En PROD (private compose Ansible), on utilise un volume Docker NOMME
      # `humanix_prod_tts_cache` declare en `external: true` pour la persistance
      # cross-deploys et la protection contre `docker compose down -v`.
      - ./data/tts-cache:/app/data/tts-cache
    depends_on:
      postgres:
        condition: service_healthy

# =====================================================================
# RÉSEAUX — segmentation L3
# =====================================================================
networks:
  # Réseau public-facing : haproxy ↔ app uniquement
  humanix_frontend:
    driver: bridge
    name: humanix_frontend

  # Réseau interne : app ↔ postgres
  # internal=true bloquerait toute sortie internet → on laisse à false pour
  # que l'app puisse appeler Scaleway TEM, Payplug, Mistral Voxtral, etc.
  humanix_backend:
    driver: bridge
    name: humanix_backend
    internal: false

volumes:
  postgres_data:
    driver: local
  # Le TTS utilise un BIND MOUNT en mode OSS local (cf. service `app` ci-dessus),
  # pas un volume Docker nomme. Pour basculer sur volume nomme (= comportement
  # prod-like), commenter le bind dans le service et decommenter le volume ici :
  # tts_cache:
  #   driver: local
