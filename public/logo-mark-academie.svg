<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo mark Humanix Académie (avec toque de diplômé)
  Variation pédagogique du logo principal.
  À remplacer par l'export SVG/PNG du logo officiel.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1FB6FF"/>
      <stop offset="100%" stop-color="#0B5FE8"/>
    </linearGradient>
  </defs>
  <!-- Toque de diplômé -->
  <path d="M68 50 L128 30 L188 50 L128 70 Z" fill="url(#g)"/>
  <path d="M148 60 L148 84 Q148 92 144 92 Q140 92 140 84 L140 64" stroke="url(#g)" stroke-width="3" fill="none"/>
  <circle cx="144" cy="94" r="3" fill="url(#g)"/>
  <!-- Tête -->
  <circle cx="128" cy="92" r="22" stroke="url(#g)" stroke-width="7" fill="none"/>
  <!-- Bouclier -->
  <path d="M64 130 L128 118 L192 130 L192 188 Q192 220 128 238 Q64 220 64 188 Z"
        stroke="url(#g)" stroke-width="7" fill="none" stroke-linejoin="round"/>
  <!-- Lettre H -->
  <path d="M104 152 L104 210 M152 152 L152 210 M104 180 L152 180"
        stroke="url(#g)" stroke-width="9" stroke-linecap="round"/>
