<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo mark Humanix-Cybersecurity (icône seule, sans texte)
  Bouclier stylisé + lettre H. Couleurs alignées sur le branding cyan/bleu.
  À remplacer par l'export SVG/PNG du logo officiel quand disponible.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1FB6FF"/>
      <stop offset="100%" stop-color="#0B5FE8"/>
    </linearGradient>
  </defs>
  <!-- Tête (cercle) -->
  <circle cx="128" cy="56" r="26" stroke="url(#g)" stroke-width="8" fill="none"/>
  <!-- Bouclier -->
  <path d="M64 100 L128 88 L192 100 L192 168 Q192 208 128 230 Q64 208 64 168 Z"
        stroke="url(#g)" stroke-width="8" fill="none" stroke-linejoin="round"/>
  <!-- Lettre H stylisée à l'intérieur -->
  <path d="M104 130 L104 198 M152 130 L152 198 M104 162 L152 162"
        stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
</svg>
