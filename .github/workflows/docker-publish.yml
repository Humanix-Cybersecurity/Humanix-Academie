name: Docker Publish (OSS)

# Publie l'image OSS de Humanix Academie sur Docker Hub.
#
# === Quand ce workflow se declenche ===
#
#   - push sur `main` : publie le tag `:edge` + `:main-<sha7>` (image
#     pre-release pour les early adopters qui veulent suivre HEAD)
#   - push d'un tag git `v*.*.*` : publie `:1.2.3`, `:1.2`, `:1`, `:latest`
#     (release stable)
#   - workflow_dispatch : declenchement manuel avec tag custom
#
# === Pourquoi pas sur PR ===
#
# On NE publie PAS sur PR : seuls les commits mergés mainstream produisent
# une image publique. Ca limite la pollution du registre + le risque qu'une
# branche cassée fasse autorité publiquement.
#
# === Mode OSS pur (sans content-pro) ===
#
# Le repo content-pro/ est un submodule prive (saisons commerciales). On
# checkoute SANS submodules pour que l'image publique tourne en mode OSS
# pur : le Dockerfile gere le cas (mkdir -p content-pro vide → fallback
# sur les 2 saisons demo CC BY-SA via resolveContentRoot()).
#
# === Multi-arch ===
#
# linux/amd64 + linux/arm64. L'arm64 est build via QEMU (emulation) — c'est
# 2-3x plus lent qu'un build natif, mais largement acceptable pour une
# release. Si le temps devient un probleme, on peut basculer arm64 sur un
# runner natif (ex: Apple Silicon) en ajoutant un matrix avec
# `runs-on: self-hosted-arm64`.
#
# === Secrets requis (Settings → Secrets and variables → Actions) ===
#
#   - DOCKERHUB_USERNAME : compte Docker Hub Humanix (humanixcybersecurity)
#   - DOCKERHUB_TOKEN    : PAT Docker Hub avec scope "Read & Write",
#                          rotation annuelle obligatoire (cf. PSSI mesure
#                          15 rotation secrets)
#
# === Variables repo override (Settings → Variables) ===
#
#   - DOCKER_IMAGE_NAME (optionnel) : surcharge le nom d'image par defaut
#     (defaut : `humanixcybersecurity/humanix-academie`).
#
# === Conformite ANSSI / OCI ===
#
# - Labels OCI standardises (org.opencontainers.image.*) pour traçabilité
# - Provenance SLSA + SBOM SPDX inclus automatiquement (cf. mesures M6 et
#   M38 ANSSI HG : cartographie composants tiers, audit reguliers)
# - Image AGPLv3 declaree explicitement dans le label `licenses`

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
    # Skip si seul le contenu non-applicatif change.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "wiki/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "LICENSE"
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      custom_tag:
        description: "Tag custom (ex: dev-test, sera prefixe par 'manual-')"
        required: false
        default: ""
      platforms:
        description: "Plateformes (defaut : linux/amd64,linux/arm64)"
        required: false
        default: "linux/amd64,linux/arm64"

# Permissions minimales : on lit le repo et on ecrit dans le registre.
# Pas de contents:write, pas de id-token (cosign keyless via build-push
# provenance suffit pour SLSA L3).
permissions:
  contents: read
  packages: read

# Une publication a la fois par ref. Si on push un commit puis un tag dans
# la foulee, le tag annule le run du commit.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false # On NE veut PAS perdre une release deja en route

env:
  # Surcharge possible via Settings → Variables → DOCKER_IMAGE_NAME.
  DEFAULT_IMAGE_NAME: humanixcybersecurity/humanix-academie

jobs:
  # ===========================================================================
  # Pre-flight : verifications avant de toucher au registre
  # ===========================================================================
  preflight:
    name: Preflight
    runs-on: self-hosted
    timeout-minutes: 5
    # Ne tourne QUE sur le repo Humanix officiel — pas sur les forks
    # (qui n'ont pas les secrets DOCKERHUB_* et ne doivent pas publier).
    if: github.repository_owner == 'Humanix-Cybersecurity'
    outputs:
      image_name: ${{ steps.config.outputs.image_name }}
      should_publish: ${{ steps.config.outputs.should_publish }}
    steps:
      - name: Resolve image config
        id: config
        run: |
          IMAGE_NAME="${{ vars.DOCKER_IMAGE_NAME || env.DEFAULT_IMAGE_NAME }}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          # On publie si l'event est push (branche/tag) OU dispatch manuel.
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi
          echo "::notice::Publishing to Docker Hub repo: ${IMAGE_NAME}"

      - name: Verify required secrets are present
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -z "${DH_USER}" || -z "${DH_TOKEN}" ]]; then
            echo "::error::Secrets DOCKERHUB_USERNAME / DOCKERHUB_TOKEN manquants. Settings → Secrets → Actions."
            exit 1
          fi
          echo "✓ Secrets Docker Hub presents"

  # ===========================================================================
  # Build & publish multi-arch
  # ===========================================================================
  publish:
    name: Build & push (${{ matrix.platform }})
    needs: preflight
    if: needs.preflight.outputs.should_publish == 'true'
    runs-on: self-hosted
    timeout-minutes: 90 # Build arm64 par QEMU peut prendre ~30 min
    # Pour eviter qu'un push en cours soit casse par un autre commit sur
    # main avant que le digest soit publie.
    strategy:
      fail-fast: true
      matrix:
        # On garde un seul "build" multi-arch (pas matrix par plateforme)
        # parce que docker/build-push gere les deux dans un seul manifest
        # via la chaine buildx. Si on veut splitter pour exploiter un
        # runner arm64 natif, on duplique en matrix [amd64, arm64] puis on
        # cree le manifest a la fin.
        platform: ["multi"]
    steps:
      - name: Checkout (sans submodule prive)
        # IMPORTANT : on NE checkoute PAS content-pro/ (submodule prive
        # repo `humanix-content-pro`). L'image OSS doit tourner sans.
        # Le Dockerfile gere ce cas (mkdir -p content-pro vide).
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0 # Necessaire pour que metadata-action voie les tags

      - name: Verify OSS mode (no content-pro contents)
        run: |
          if [ -f content-pro/prisma/catalog-saisons.ts ]; then
            echo "::error::content-pro/ a ete checkoute - ce workflow doit publier en mode OSS PUR uniquement"
            exit 1
          fi
          echo "✓ Mode OSS confirme (content-pro vide)"

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.preflight.outputs.image_name }}
          # === Strategie de tags ===
          #
          # - push tag v1.2.3 → 1.2.3, 1.2, 1, latest (+ edge si main)
          # - push main      → edge, main-<sha7>
          # - dispatch       → manual-<custom_tag> + <branch-name>
          #
          # On NE publie PAS de tag "main" — c'est confus avec edge.
          # On NE publie PAS de tag "develop" — develop n'a pas
          # vocation d'etre tire publiquement.
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=manual-${{ github.event.inputs.custom_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.custom_tag != '' }}
          # === Labels OCI standardises ===
          #
          # Lus par les outils GRC / SBOM / scanner. Tracabilite tracee
          # automatiquement vers le commit source.
          labels: |
            org.opencontainers.image.title=Humanix Académie
            org.opencontainers.image.description=Plateforme française de sensibilisation cyber — souveraine, AGPLv3, conforme ANSSI HG 42 mesures
            org.opencontainers.image.vendor=Humanix Cybersecurity SASU (Toulouse, France)
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/Humanix-Cybersecurity/Humanix-Academie
            org.opencontainers.image.url=https://humanix-academie.fr
            org.opencontainers.image.documentation=https://github.com/Humanix-Cybersecurity/Humanix-Academie/wiki
            org.opencontainers.image.authors=Humanix Cybersecurity <security@humanix-cybersecurity.fr>
            io.humanix.flavor=oss
            io.humanix.compliance.anssi-hg=42-mesures-mappees
            io.humanix.sovereignty=eu-only

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # === Cache build buildx via GitHub Actions cache ===
          # Reduit le temps des builds suivants de ~30 min a ~5 min sur
          # les couches stables (node_modules, deps Alpine).
          cache-from: type=gha,scope=docker-${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=docker-${{ github.workflow }}
          # === Supply chain ===
          # Provenance SLSA + SBOM SPDX inclus dans le manifest. Pas
          # besoin de cosign en plus : le manifest signe est attestable
          # via `docker buildx imagetools inspect`.
          provenance: mode=max
          sbom: true
          # Args de build : NEXT_PUBLIC_* vides pour l'image OSS
          # (l'utilisateur les overrider au runtime via docker-compose).
          build-args: |
            NEXT_PUBLIC_APP_URL=
            NEXT_PUBLIC_APP_NAME=Humanix Académie
            NEXT_PUBLIC_BASE_URL=
            NEXT_PUBLIC_PLAUSIBLE_DOMAIN=
            NEXT_PUBLIC_PLAUSIBLE_API_HOST=
            NEXT_PUBLIC_PLAUSIBLE_CLOUD_SCRIPT=
            NEXT_PUBLIC_MATOMO_URL=
            NEXT_PUBLIC_MATOMO_SITE_ID=

      - name: Image digest
        run: |
          echo "::notice::Image publiee : ${{ needs.preflight.outputs.image_name }}"
          echo "::notice::Tags : ${{ steps.meta.outputs.tags }}"
          echo "::notice::Pour pull : docker pull ${{ needs.preflight.outputs.image_name }}:latest"

  # ===========================================================================
  # Smoke test (optionnel mais recommande)
  # ===========================================================================
  smoke-test:
    name: Smoke test pulled image
    needs: [preflight, publish]
    if: |
      needs.preflight.outputs.should_publish == 'true' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Determine tag to test
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="latest"
          else
            TAG="edge"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Pull image
        run: docker pull ${{ needs.preflight.outputs.image_name }}:${{ steps.tag.outputs.tag }}

      - name: Run container (skip migrations, fake DATABASE_URL)
        run: |
          docker run -d --name humanix-smoketest \
            -p 13000:3000 \
            -e DATABASE_URL=postgresql://placeholder:placeholder@placeholder:5432/placeholder \
            -e AUTH_SECRET=smoketest-secret-not-real-32chars-ok \
            -e SKIP_MIGRATIONS=true \
            -e NODE_ENV=production \
            ${{ needs.preflight.outputs.image_name }}:${{ steps.tag.outputs.tag }}
          # Attendre que Next.js demarre (max 60s)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:13000/ >/dev/null 2>&1; then
              echo "✓ Container repond apres ${i}s"
              break
            fi
            sleep 1
          done

      - name: Container logs (toujours)
        if: always()
        run: docker logs humanix-smoketest 2>&1 | tail -50

      - name: Cleanup
        if: always()
        run: |
          docker rm -f humanix-smoketest 2>/dev/null || true
          # Limite l'inflation du cache docker sur self-hosted
          docker image prune -af --filter "until=24h" 2>/dev/null || true

  # ===========================================================================
  # Update Docker Hub README (optionnel — desactive par defaut)
  # ===========================================================================
  # Si on veut auto-pousser un README sur la page Docker Hub publique,
  # decommenter ce job et ajouter un secret DOCKERHUB_README_TOKEN.
  # Pour l'instant on laisse manual via UI Docker Hub.
