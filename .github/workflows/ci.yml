name: CI

# Tourne sur :
# - chaque push sur main
# - chaque PR vers main
# Vérifie : lint + typecheck + tests + build + audits OSS + format + DCO.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions minimales (principe du moindre privilège).
permissions:
  contents: read

# Opt-in immédiat sur Node 24 pour les actions JavaScript (cf. annonce GitHub
# du 19/09/2025 : Node 20 deprecated, suppression le 16/09/2026).
# On s'aligne dès maintenant pour valider la compatibilité avant que GitHub
# force la migration le 2 juin 2026 (1 semaine après notre launch).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Annule les runs précédents pour la même PR (gain CI minutes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job : Lint + TypeScript strict
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint + tsc --noEmit
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Job : Tests unitaires + coverage (Vitest)
  # ---------------------------------------------------------------------------
  test:
    name: Tests unitaires (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job : Build production (sanity check)
  # ---------------------------------------------------------------------------
  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Variables minimales pour que le build passe (pas de runtime).
          AUTH_SECRET: build-time-only-not-a-real-secret
          DATABASE_URL: postgresql://user:pass@localhost:5432/build?schema=public
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: Humanix Académie

  # ---------------------------------------------------------------------------
  # Job : Audit de sécurité npm
  # ---------------------------------------------------------------------------
  security:
    name: npm audit (HIGH/CRITICAL)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit production dependencies (HIGH/CRITICAL only)
        run: npm audit --omit=dev --audit-level=high

  # ---------------------------------------------------------------------------
  # Job : Validation MDX <-> catalogue
  # ---------------------------------------------------------------------------
  # Catch les MDX orphelins dont le slug ne match pas prisma/catalog-saisons.ts.
  # Bug observe en mai 2026 : 7 fichiers MDX rediges par des experts ne se
  # chargeaient jamais (mismatch silencieux 02-faux-rib vs 02-le-faux-rib).
  # Cf. scripts/validate-mdx-catalog.ts.
  mdx-catalog:
    name: Validation MDX <-> catalogue
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify MDX slugs match catalog
        run: npm run validate:mdx

  # ---------------------------------------------------------------------------
  # Job : Headers SPDX AGPL-3.0-or-later
  # ---------------------------------------------------------------------------
  # Verifie que tous les fichiers source TS/TSX ont un header SPDX. Bloque
  # le merge si un nouveau fichier oublie de le mettre. Approche moderne
  # (FSF + Linux kernel) : 1 ligne SPDX au lieu d'un boilerplate copyright.
  # Cf. scripts/add-license-headers.ts (regen avec `npm run license:headers`).
  license-headers:
    name: Headers SPDX AGPL-3.0
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify SPDX headers on source files
        run: npm run license:check

  # ---------------------------------------------------------------------------
  # Job : Audit couverture .env.example
  # ---------------------------------------------------------------------------
  # Vérifie qu'aucune variable consommée par le code (process.env.X) ne manque
  # dans .env.example. Garde-fou pré-launch OSS : un .env.example exhaustif
  # évite qu'un dev hardcode un secret par flemme. Cf. scripts/audit-env-coverage.ts.
  env-audit:
    name: Couverture .env.example
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit env coverage
        run: npm run audit:env

  # ---------------------------------------------------------------------------
  # Job : Build du connecteur MCP server autonome
  # ---------------------------------------------------------------------------
  # connectors/mcp-server/ est un sous-projet TypeScript autonome avec son
  # propre package.json (deps MIT pour publication npm independante). Il n'est
  # pas couvert par le `npm ci` racine. Sans ce job, on a deja eu un bug en
  # mai 2026 ou un import casse n'etait detecte qu'au build Docker (PR #34).
  mcp-server-build:
    name: Build connectors/mcp-server
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install MCP server dependencies
        working-directory: connectors/mcp-server
        run: npm install

      - name: Lint (tsc --noEmit)
        working-directory: connectors/mcp-server
        run: npm run lint

      - name: Build
        working-directory: connectors/mcp-server
        run: npm run build

      - name: Tests
        working-directory: connectors/mcp-server
        run: npm test

  # ---------------------------------------------------------------------------
  # Job : Vérification format Prettier
  # ---------------------------------------------------------------------------
  format:
    name: Prettier check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml,yaml}"
        continue-on-error: true # Format check ne bloque pas la PR (avertissement seulement)

  # ---------------------------------------------------------------------------
  # Job : Vérification DCO (Developer Certificate of Origin)
  # ---------------------------------------------------------------------------
  dco:
    name: DCO signed-off-by check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on commits
        run: |
          BASE_SHA=$(git merge-base origin/main HEAD)
          UNSIGNED=$(git log --format='%h %s' "${BASE_SHA}..HEAD" --invert-grep --grep='^Signed-off-by:' || true)
          if [ -n "${UNSIGNED}" ]; then
            echo "Les commits suivants ne sont pas signés DCO :"
            echo "${UNSIGNED}"
            echo ""
            echo "Pour corriger : git rebase --signoff ${BASE_SHA}"
            echo "Puis : git push --force-with-lease"
            exit 1
          fi
          echo "Tous les commits sont signés DCO."
