# Dependabot v2 - Humanix Académie Community Edition
#
# Stratégie pour solo mainteneur - VERSION 2 (5 mai 2026) :
#
#   Leçon de la v1 : les groupes "nommés" (next-stack, prisma-stack…) sans
#   filtre `update-types` ont laissé passer des MAJORS dangereuses
#   (Prisma 5→7, next-mdx-remote 5→6, zod 3→4, next-auth beta.25→beta.31).
#
#   Règle d'or de la v2 : TOUS les groupes ont un filtre `update-types`
#   strict à `["minor", "patch"]`. Les MAJORS sont bloquées par `ignore:`
#   sur tous les packages critiques. Si une MAJOR est nécessaire, on la
#   fait à la main, en pleine conscience.
#
# Documentation : https://docs.github.com/code-security/dependabot

version: 2

updates:
  # =========================================================================
  # 1. Stack Next.js (racine) - minor + patch uniquement
  # =========================================================================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    assignees:
      - "Meg4R0M"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

    # ----- Groupes : tous filtrés à minor + patch -----
    groups:
      next-stack:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/*"
        update-types:
          - "minor"
          - "patch"
      auth-stack:
        patterns:
          - "next-auth"
          - "@auth/*"
        update-types:
          - "minor"
          - "patch"
      tailwind-stack:
        patterns:
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "@tailwindcss/*"
        update-types:
          - "minor"
          - "patch"
      production-others:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-others:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

    # ----- Bloquer les MAJORS sur tout package critique -----
    # Une MAJOR sera mise à jour manuellement, dans une PR dédiée et testée.
    ignore:
      # Stack Next.js - MAJORS bloquées (migrations souvent breaking)
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

      # Prisma - MAJOR strictement bloquée (CLI doit rester aligné avec le client)
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]

      # NextAuth en beta - pas de bumps automatiques (trop volatil)
      # On gère manuellement, sur preview locale d'abord
      - dependency-name: "next-auth"
        # Toutes les mises à jour bloquées, on contrôle à la main
        versions: [">= 0"]
      - dependency-name: "@auth/*"
        update-types: ["version-update:semver-major"]

      # Validation / serialization - MAJORS souvent breaking
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next-mdx-remote"
        update-types: ["version-update:semver-major"]

      # Style / UI - MAJORS souvent à migrer manuellement
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

      # Outils dev - MAJORS souvent à migrer manuellement
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]

      # Node types - suivent la LTS, MAJOR à migrer avec engines.node
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # =========================================================================
  # 2. Connecteurs Python (8 dossiers) - minor + patch uniquement, mensuel
  # =========================================================================
  - package-ecosystem: "pip"
    directories:
      - "/connectors/ciso-assistant"
      - "/connectors/splunk"
      - "/connectors/sentinel"
      - "/connectors/lucca"
      - "/connectors/glpi"
      - "/connectors/sekoia"
      - "/connectors/harfanglab"
      - "/connectors/mailinblack-vade"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    assignees:
      - "Meg4R0M"
    labels:
      - "dependencies"
      - "python"
      - "connectors"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Bloquer les MAJORS sur tous les paquets Python (rare mais possible)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # =========================================================================
  # 3. GitHub Actions workflows - minor + patch uniquement, mensuel
  # =========================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    assignees:
      - "Meg4R0M"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      gh-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Bloquer les MAJORS sur les actions (souvent breaking côté inputs)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # =========================================================================
  # 4. Docker (Dockerfile à la racine) - patch uniquement, mensuel
  # =========================================================================
  # Plus strict que le reste : pour Docker, même les minors sont risquées
  # (changement de runtime Node.js, libssl, glibc, etc.). On reste sur les
  # patches de sécurité uniquement.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    assignees:
      - "Meg4R0M"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    groups:
      docker-images:
        patterns:
          - "*"
        update-types:
          - "patch"
    ignore:
      # Bloquer minor + major sur les images Docker (Node 20 → 22 → 24 = MAJOR
      # à planifier, jamais auto)
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
